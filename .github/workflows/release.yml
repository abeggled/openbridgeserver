name: "Release"

on:
  push:
    tags:
      - '*'
      - '!nightly-*'  # nightly-lxc.yml creates these; must not trigger a real release/build

permissions: {}

env:
  PROJECT_NAME: openbridgeserver

jobs:
  validate-tag:
    name: Validate tag
    # Reusable-workflow tokens can only be reduced, never elevated, from the
    # caller's permissions — the workflow-level `permissions: {}` above would
    # otherwise strip the `contents: read` the callee needs for its branch/
    # compare API checks.
    permissions:
      contents: read
    uses: ./.github/workflows/validate-release-tag.yml

  release:
    name: Release
    needs: validate-tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up Python
        uses: actions/setup-python@v7.0.0
        with:
          python-version: '3.x'

      - name: Extract release notes
        run: |
          TAG_NAME="${GITHUB_REF##*/}"
          REPO="${{ github.repository }}"
          PROJECT="${{ env.PROJECT_NAME }}"
          export TAG_NAME REPO PROJECT
          python3 <<'EOF'
          import os, re
          tag = os.environ['TAG_NAME']
          repo = os.environ['REPO']
          project = os.environ['PROJECT']
          # Remove -RC* suffix for release candidates
          base_version = re.sub(r'-RC\d*$', '', tag)
          with open('RELEASENOTES.md', 'r') as f:
              lines = f.readlines()
          pattern = re.compile(r'^##\s+' + re.escape(base_version) + r'\s*$')
          notes = []
          in_section = False
          for line in lines:
              if pattern.match(line):
                  in_section = True
                  continue
              if in_section and line.startswith('## '):
                  break
              if in_section:
                  notes.append(line.rstrip())
          is_rc = bool(re.search(r'-RC\d*$', tag, re.IGNORECASE))
          pull_tag = tag if is_rc else 'latest'
          image = f"ghcr.io/{repo.lower()}:{pull_tag}"
          notes += [
              '',
              '### Docker Image',
              '',
              '```bash',
              f'docker pull {image}',
              '```',
              '',
              f'[View on GitHub Container Registry](https://github.com/{repo}/pkgs/container/{project})',
          ]
          with open('.github/RELEASENOTES_FOOTER.md', 'r') as footer:
              notes += ['', footer.read().strip()]
          with open('release_notes.txt', 'w') as out:
              out.write('\n'.join(notes).strip())
          EOF

      - name: Inject contributors
        # Skip for release candidates — the same contributors will appear on the final tag.
        if: ${{ !contains(github.ref_name, '-RC') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 <<'EOF'
          import json, os, re, subprocess, sys, urllib.error, urllib.request

          current_tag = os.environ["GITHUB_REF"].split("/")[-1]
          repo        = os.environ["GITHUB_REPOSITORY"]
          token       = os.environ["GITHUB_TOKEN"]

          # Previous full-release tag: exclude nightly builds and RC pre-releases.
          result = subprocess.run(
              ["git", "tag", "--list", "--sort=-version:refname"],
              capture_output=True, text=True, check=True,
          )
          prev_tag = next(
              (
                  t for t in result.stdout.splitlines()
                  if t
                  and t != current_tag
                  and not t.startswith("nightly-")
                  and not re.search(r"-RC\d*$", t, re.IGNORECASE)
              ),
              None,
          )
          if not prev_tag:
              print("No previous release tag found — skipping contributors section.")
              sys.exit(0)
          print(f"Contributors: comparing {prev_tag}...{current_tag}")

          url = f"https://api.github.com/repos/{repo}/compare/{prev_tag}...{current_tag}"
          req = urllib.request.Request(url, headers={
              "Authorization": f"Bearer {token}",
              "Accept": "application/vnd.github+json",
              "X-GitHub-Api-Version": "2022-11-28",
          })
          try:
              with urllib.request.urlopen(req) as resp:
                  data = json.load(resp)
          except urllib.error.URLError as exc:
              print(f"GitHub API error ({exc}) — skipping contributors section.")
              sys.exit(0)

          FOUNDER_LOGIN = "abeggled"

          logins = sorted({
              c["author"]["login"]
              for c in data.get("commits", [])
              if c.get("author") and c["author"].get("type") != "Bot"
          }, key=lambda login: (login != FOUNDER_LOGIN, login))
          if not logins:
              print("No human contributors found — skipping contributors section.")
              sys.exit(0)

          def gh_get(path: str) -> dict | list:
              req = urllib.request.Request(
                  f"https://api.github.com/{path}",
                  headers={
                      "Authorization": f"Bearer {token}",
                      "Accept": "application/vnd.github+json",
                      "X-GitHub-Api-Version": "2022-11-28",
                  },
              )
              with urllib.request.urlopen(req) as r:
                  return json.load(r)

          def get_display(login: str) -> str:
              try:
                  name = gh_get(f"users/{login}").get("name") or ""
              except urllib.error.URLError:
                  name = ""
              nick = f"@{login}, founder" if login == FOUNDER_LOGIN else f"@{login}"
              display = f"{name} ({nick})" if name else nick
              try:
                  prior = gh_get(
                      f"repos/{repo}/commits?author={login}&sha={prev_tag}&per_page=1"
                  )
                  if not prior:
                      display += " 🎉 _(first contribution!)_"
              except urllib.error.URLError:
                  pass
              return display

          lines = [f"* {get_display(login)}" for login in logins]

          section = (
              "### Contributors 🤝\n\n"
              "Thank you to everyone who contributed to this release:\n\n"
              + "\n".join(lines)
              + "\n"
          )

          with open("release_notes.txt") as f:
              content = f.read()
          # Insert before the Docker Image section that was appended by the previous step.
          content = content.replace("### Docker Image", section + "\n### Docker Image", 1)
          with open("release_notes.txt", "w") as f:
              f.write(content)
          print(f"Added {len(logins)} contributor(s): {', '.join(logins)}")
          EOF

      - name: Set version and hash variables
        run: |
          echo "VERSION=${GITHUB_REF##*/}" >> "$GITHUB_ENV"
          echo "GITHASH=$(git rev-parse --short HEAD)" >> "$GITHUB_ENV"
          BASE=$(grep -m1 '^## ' RELEASENOTES.md | sed 's/^## *//')
          TAG="${GITHUB_REF##*/}"
          if [[ "$TAG" =~ (-RC[0-9]*)$ ]]; then RC="${BASH_REMATCH[1]}"; else RC=""; fi
          echo "OBS_VERSION=${BASE}${RC}" >> "$GITHUB_ENV"

      - name: Stamp gui/package.json version
        run: npm pkg set version="${VERSION}" --prefix gui

      - name: Set prerelease flag
        run: |
          if [[ "${GITHUB_REF##*/}" =~ -RC ]]; then
            echo "PRERELEASE=true" >> "$GITHUB_ENV"
          else
            echo "PRERELEASE=false" >> "$GITHUB_ENV"
          fi

      - name: Create GitHub Release and Upload Asset
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body_path: release_notes.txt
          prerelease: ${{ env.PRERELEASE }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable=${{ env.PRERELEASE == 'false' }}
            type=raw,value=${{ env.VERSION }}
            type=raw,value=${{ env.GITHASH }}

      - name: Build and Push Image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            OBS_VERSION=${{ env.OBS_VERSION }}

  prepare-next-release:
    name: Prepare next release on main
    runs-on: ubuntu-latest
    needs: release
    # Only for stable .0 releases — not RCs, not patch releases (PATCH > 0)
    if: ${{ !contains(github.ref_name, '-RC') && endsWith(github.ref_name, '.0') }}
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout main
        uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 1

      - name: Create version bump PR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          YEAR=$(echo "$TAG" | cut -d. -f1)
          MINOR=$(echo "$TAG" | cut -d. -f2)
          # Force base-10: a tag like 2026.08.0 would otherwise make bash
          # parse "08"/"09" as invalid octal literals and abort this job.
          MINOR=$((10#$MINOR))
          if [[ "$MINOR" -eq 12 ]]; then
            NEXT_YEAR=$((YEAR + 1))
            NEXT_MINOR=1
          else
            NEXT_YEAR=$YEAR
            NEXT_MINOR=$((MINOR + 1))
          fi
          NEXT_VERSION="${NEXT_YEAR}.${NEXT_MINOR}.0"
          BRANCH="release-prep/${NEXT_VERSION}"

          echo "Preparing next release: $NEXT_VERSION on branch $BRANCH"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Idempotency: a workflow re-run for the same tag (e.g. after a
          # transient failure in a later step) must not fail on an already
          # pushed branch, open a duplicate PR, or insert a second
          # "## ${NEXT_VERSION}" section once the first prep PR is merged.
          # An existing prep branch *without* a PR (e.g. `gh pr create`
          # failed transiently right after the push) is resumed by opening
          # the missing PR instead of being treated as already done.
          if grep -qF "## ${NEXT_VERSION}" RELEASENOTES.md; then
            echo "RELEASENOTES.md already has a section for ${NEXT_VERSION} — nothing to do."
            exit 0
          fi
          # --state open only: a closed-but-unmerged prep PR must not be
          # mistaken for completed work — a merged PR is already caught by
          # the RELEASENOTES.md content check above.
          EXISTING_PR="$(gh pr list --repo "${{ github.repository }}" --state open --head "$BRANCH" --json number --jq '.[0].number' 2>/dev/null || true)"
          if [[ -n "$EXISTING_PR" ]]; then
            echo "PR #${EXISTING_PR} for ${BRANCH} already exists — nothing to do."
            exit 0
          fi

          # An existing prep branch without a PR (e.g. `gh pr create` failed
          # transiently right after the push) is resumed by checking it out
          # instead of being treated as already done.
          if git ls-remote --exit-code --heads origin "$BRANCH" >/dev/null 2>&1; then
            echo "Branch ${BRANCH} already exists without a PR — resuming."
            # actions/checkout only has "main" (fetch-depth: 1); a plain
            # `git fetch origin "$BRANCH"` only updates FETCH_HEAD, it does
            # not create a local or origin/$BRANCH ref to check out. Force
            # the local branch to point at FETCH_HEAD explicitly instead.
            git fetch origin "$BRANCH"
            git checkout -B "$BRANCH" FETCH_HEAD
          else
            git checkout -b "$BRANCH"
          fi

          # Idempotent on its own: no-ops if the section is already present
          # on the checked-out branch (the resume case above).
          NEXT_VERSION="$NEXT_VERSION" python3 - <<'PYEOF'
          import os, sys

          next_version = os.environ['NEXT_VERSION']

          with open("RELEASENOTES.md", "r") as f:
              content = f.read()

          if f"## {next_version}" in content:
              print(f"Section for {next_version} already present on this branch — nothing to insert.")
              sys.exit(0)

          new_lines = [
              f"## {next_version}",
              "### Breaking changes 🚨",
              "* none",
              "",
              "### New features ✨",
              "* none",
              "",
              "### Fixes 🐞",
              "* none",
              "",
              "### Known Issues 🔔",
              "* none",
              "",
          ]

          lines = content.split("\n")
          insert_at = next((i for i, l in enumerate(lines) if l.startswith("## ")), len(lines))
          for nl in reversed(new_lines):
              lines.insert(insert_at, nl)

          with open("RELEASENOTES.md", "w") as f:
              f.write("\n".join(lines))

          print(f"Added section for {next_version}")
          PYEOF

          if git diff --quiet RELEASENOTES.md; then
            echo "RELEASENOTES.md unchanged on ${BRANCH} — skipping commit/push."
          else
            git add RELEASENOTES.md
            git commit -m "chore: prepare RELEASENOTES.md for ${NEXT_VERSION}"
            git push -u origin "$BRANCH"
          fi

          {
            echo "Automatisch erstellt nach dem stabilen \`${TAG}\`-Release."
            echo ""
            echo "Fügt einen leeren Abschnitt für \`${NEXT_VERSION}\` in \`RELEASENOTES.md\` ein."
            echo ""
            echo "→ Bitte reviewen und mergen, bevor der erste Feature-PR für das nächste Release landet."
          } > pr_body.md

          gh pr create \
            --title "chore: Prepare RELEASENOTES.md for ${NEXT_VERSION}" \
            --body-file pr_body.md \
            --base main \
            --head "$BRANCH"
