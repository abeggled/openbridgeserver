name: visu-ci

on:
  push:
    branches:
      - feat/visu-mobile-skins
      - 'feat/visu-*'
  pull_request:
    branches:
      - feat/visu-mobile-skins
      - 'feat/visu-*'

# Only the Visu workspace; existing openbridgeserver workflows are untouched.
defaults:
  run:
    shell: bash

jobs:
  visu:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # M2 dev-link (CONTRIBUTING-visu.md → "Dev-Link"): apps/visu depends on the
      # ionic skin via an absolute `link:` path, and the skin links back to the
      # contract the same way. The runner recreates that local topology: check out
      # the skins repo and symlink both absolute paths onto the workspace.
      # Removed at release, when the links become published npm versions.
      - uses: actions/checkout@v4
        with:
          repository: Micsi/obs-visu-skins
          ref: main
          path: .obs-visu-skins

      # pnpm normalises link: deps to workspace-RELATIVE paths in the lockfile
      # (e.g. link:../../../obs-visu-skins/...), so the runner must mirror the
      # local sibling topology in the workspace parent. The /Volumes symlinks
      # additionally satisfy the absolute specifiers in package.json.
      - name: Recreate dev-link paths
        run: |
          WORK_PARENT="$(dirname "$GITHUB_WORKSPACE")"
          mv "$GITHUB_WORKSPACE/.obs-visu-skins" "$WORK_PARENT/obs-visu-skins"
          ln -s "$GITHUB_WORKSPACE" "$WORK_PARENT/openbridgeserver-visu-integrate"
          sudo mkdir -p /Volumes/Daten/Projekte/openbridge
          sudo ln -s "$WORK_PARENT/obs-visu-skins" /Volumes/Daten/Projekte/openbridge/obs-visu-skins
          sudo ln -s "$GITHUB_WORKSPACE" /Volumes/Daten/Projekte/openbridge/openbridgeserver-visu-integrate

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      # The linked skin resolves @obs/visu-contract through its own node_modules,
      # so the skins workspace needs its install too (links only, no registry).
      - name: Install (linked skins repo)
        run: pnpm --dir /Volumes/Daten/Projekte/openbridge/obs-visu-skins install --frozen-lockfile

      - name: Debug dev-link resolution
        run: |
          echo "--- app node_modules scope ---"
          ls -la apps/visu/node_modules/@obs-visu-skins/ 2>/dev/null || echo "NO @obs-visu-skins DIR"
          echo "--- realpath of the link ---"
          readlink -f apps/visu/node_modules/@obs-visu-skins/ionic 2>/dev/null || echo "LINK MISSING"
          echo "--- target reachable via /Volumes ---"
          ls /Volumes/Daten/Projekte/openbridge/obs-visu-skins/packages/skins/ionic/renderers.ts 2>/dev/null || echo "TARGET MISSING"
          echo "--- skin node_modules contract link ---"
          readlink -f /Volumes/Daten/Projekte/openbridge/obs-visu-skins/packages/skins/ionic/node_modules/@obs/visu-contract 2>/dev/null || echo "CONTRACT LINK MISSING"

      - name: Build
        run: pnpm -r build

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Lint
        run: pnpm lint

      - name: Test (Vitest)
        run: pnpm -r test

      - name: Import boundaries
        run: pnpm boundaries
