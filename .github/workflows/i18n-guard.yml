name: i18n Guard

on:
  push:
    branches:
      - main
      - '[0-9][0-9][0-9][0-9].[0-9]*'  # release maintenance lines, e.g. 2026.6, 2026.7
      - bug/*
      - bugfix/*
      - feat/*
      - feature/*
  pull_request:
    branches:
      - main
      - '[0-9][0-9][0-9][0-9].[0-9]*'  # release maintenance lines, e.g. 2026.6, 2026.7

permissions: {}

jobs:
  i18n-guard:
    name: i18n-guard
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.14"

      - name: Run i18n hard gate (pull_request)
        if: github.event_name == 'pull_request'
        env:
          I18N_DIFF_BASE: ${{ github.event.pull_request.base.sha }}
          I18N_DIFF_HEAD: ${{ github.event.pull_request.head.sha }}
        run: ./tools/check-i18n-hardcoded-strings.sh

      - name: Run i18n soft gate (push)
        id: i18n_push
        if: github.event_name == 'push'
        continue-on-error: true
        env:
          I18N_DIFF_BASE: ${{ github.event.before }}
          I18N_DIFF_HEAD: ${{ github.sha }}
        run: ./tools/check-i18n-hardcoded-strings.sh

      - name: Report i18n soft-gate warning (push)
        if: github.event_name == 'push' && steps.i18n_push.outcome == 'failure'
        run: |
          echo "::warning title=i18n guard soft-fail::Hardcoded i18n strings found in push diff. This does not block push runs; PR runs remain hard-fail."
