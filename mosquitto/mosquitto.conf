# Mosquitto configuration for open bridge server

# ── Access control ──────────────────────────────────────────────────────────
# Password file is managed by open bridge server (rebuilt on startup + user changes).
# Users with mqtt_enabled=true appear here; obs service account is always included.
allow_anonymous false
password_file /mosquitto/passwd/passwd

# ── Listeners ──────────────────────────────────────────────────────────────
listener 1883
protocol mqtt

listener 9001
protocol websockets

# ── Persistence ────────────────────────────────────────────────────────────
persistence true
persistence_location /mosquitto/data/

# ── Logging ────────────────────────────────────────────────────────────────
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type error
log_type warning
log_type notice
# log_type information   # uncomment for verbose logging

# ── Connection limits ──────────────────────────────────────────────────────
max_connections 100
max_keepalive 120
