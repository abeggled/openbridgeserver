# Mosquitto configuration for OpenTWS
# Minimal setup — adjust for production (authentication, TLS)

# ── Listeners ──────────────────────────────────────────────────────────────
listener 1883
protocol mqtt

listener 9001
protocol websockets

# ── Access control ─────────────────────────────────────────────────────────
# WARNING: anonymous access enabled for development.
# For production: set allow_anonymous false and configure password_file.
allow_anonymous true
# password_file /mosquitto/config/passwd

# ── Persistence ────────────────────────────────────────────────────────────
persistence true
persistence_location /mosquitto/data/

# ── Logging ────────────────────────────────────────────────────────────────
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type error
log_type warning
log_type notice
# log_type information   # uncomment for verbose logging

# ── Connection limits ──────────────────────────────────────────────────────
max_connections 100
max_keepalive 120
